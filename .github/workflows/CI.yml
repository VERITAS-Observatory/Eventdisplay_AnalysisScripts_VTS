---
name: CI

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash -leo pipefail {0}

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".pre-commit-config.yaml"

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Check whether the citation metadata from CITATION.cff is valid
        uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: "--validate"

      - name: Pre-commit
        run: |
          python -m pip install pre-commit
          SKIP=no-commit-to-branch  pre-commit run --all-files

      - name: ShellCheck
        run: |
          find scripts -name "*.sh" -print0 | sort -z | xargs -0 shellcheck --severity=info

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Install workflow and shell linters
        run: |
          mkdir -p "${RUNNER_TEMP}/go-bin"
          echo "${RUNNER_TEMP}/go-bin" >> "${GITHUB_PATH}"
          GOBIN="${RUNNER_TEMP}/go-bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          GOBIN="${RUNNER_TEMP}/go-bin" go install mvdan.cc/sh/v3/cmd/shfmt@v3.11.0

      - name: Actionlint
        run: |
          actionlint

      - name: shfmt syntax check
        run: |
          shfmt -f scripts >/dev/null

  python-db-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash -leo pipefail {0}

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "scripts/db_scripts/environment.yml"

      - name: Install DB script dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install astropy numpy unidecode

      - name: Compile DB Python scripts
        run: |
          python -m compileall scripts/db_scripts

      - name: Smoke-test DB Python command-line interfaces
        run: |
          python scripts/db_scripts/db_write_fits.py --help
          python scripts/db_scripts/db_combine_dqm_fits.py --help
